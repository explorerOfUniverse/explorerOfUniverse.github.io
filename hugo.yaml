baseURL: "https://explorerOfUniverse.github.io/"
title: "My blog"
theme: "PaperMod"

enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
pygmentsUseClasses: true
mainSections: ["posts"]

defaultContentLanguage: "en"
defaultContentLanguageInSubdir: false

hasCJKLanguage: false

pagination:
  pagerSize: 10

params:
  env: production
  description: "My personal blog"
  author: "explorerOfUniverse"
  profileMode:
    enabled: true
    title: "My blog"
    subtitle: "Writing about things I learn"
    imageUrl: "/images/avatar.png"
    imageTitle: "avatar"
    imageWidth: 120
    imageHeight: 120
    buttons:
      - name: Posts
        url: "posts/"
      - name: About
        url: "about/"
      - name: GitHub
        url: "https://github.com/explorerOfUniverse"
  homeInfoParams:
    Title: "Hi there"
    Content: "Welcome to my blog. I write about things I learn."
  socialIcons:
    - name: github
      title: GitHub
      url: "https://github.com/explorerOfUniverse"
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true
  disableSpecial1stPost: true
  disableScrollToTop: false
  comments: false
  hidemeta: false
  mainSections:
    - "posts"

menu:
  main:
    - name: Home
      url: "/"
      weight: 1
    - name: Posts
      url: "/posts/"
      weight: 2
    - name: Archive
      url: "/archives/"
      weight: 3
    - name: About
      url: "/about/"
      weight: 4
    - name: Tags
      url: "/tags/"
      weight: 5

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    codeFences: true
    guessSyntax: true
  tableOfContents:
    endLevel: 3
    ordered: false
    startLevel: 2

outputs:
  home: ["HTML", "RSS"]
  section: ["HTML", "RSS"]
  taxonomy: ["HTML", "RSS"]
  term: ["HTML"]
