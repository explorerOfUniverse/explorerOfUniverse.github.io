baseURL: "https://explorerOfUniverse.github.io/"
title: "My blog"
theme: "ananke"

module:
  imports:
    - path: github.com/theNewDynamic/gohugo-theme-ananke

enableRobotsTXT: true
enableInlineShortcodes: true
enableEmoji: true
pygmentsUseClasses: true
mainSections: ["posts"]

pagination:
  pagerSize: 10

params:
  description: "My personal blog"
  author: "explorerOfUniverse"
  featured_image: "/images/avatar.png"
  recent_posts_number: 5
  mainSections:
    - "posts"

menu:
  main:
    - name: Home
      url: "/"
      weight: 1
    - name: Posts
      url: "/posts/"
      weight: 2
    - name: About
      url: "/about/"
      weight: 3
    - name: Tags
      url: "/tags/"
      weight: 4

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    codeFences: true
  tableOfContents:
    endLevel: 3
    ordered: false
    startLevel: 2

outputs:
  home: ["HTML", "RSS"]
  section: ["HTML", "RSS"]
  taxonomy: ["HTML", "RSS"]
